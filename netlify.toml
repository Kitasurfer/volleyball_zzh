[build]
  base = "."
  command = "pnpm install --frozen-lockfile && pnpm run build"
  publish = "dist"

 [build.environment]
  NETLIFY_USE_PNPM = "true"
  PNPM_VERSION = "9.11.0"
  NODE_VERSION = "20.11.1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Do NOT force, so that real static assets (JS/CSS) are served correctly.
