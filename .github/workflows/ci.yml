name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Check versions
        run: |
          node --version
          pnpm --version
          which pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Debug environment variables
        run: |
          echo "VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}"
          echo "VITE_SUPABASE_FUNCTIONS_URL: ${{ vars.VITE_SUPABASE_FUNCTIONS_URL }}"
          echo "VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}"
          echo "QDRANT_URL: ${{ vars.QDRANT_URL }}"
          echo "DOCLING_SERVICE_URL: ${{ vars.DOCLING_SERVICE_URL }}"
          echo "VITE_SUPABASE_ANON_KEY set: $([ -z '${{ secrets.VITE_SUPABASE_ANON_KEY }}' ] && echo 'NO' || echo 'YES')"
          echo "SUPABASE_SERVICE_ROLE_KEY set: $([ -z '${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' ] && echo 'NO' || echo 'YES')"
          echo "QDRANT_API_KEY set: $([ -z '${{ secrets.QDRANT_API_KEY }}' ] && echo 'NO' || echo 'YES')"
          echo "CEREBRAS_API_KEY set: $([ -z '${{ secrets.CEREBRAS_API_KEY }}' ] && echo 'NO' || echo 'YES')"
          echo "VLW_API_KEY set: $([ -z '${{ secrets.VLW_API_KEY }}' ] && echo 'NO' || echo 'YES')"

      - name: Build
        env:
          # Vite frontend config
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_FUNCTIONS_URL: ${{ vars.VITE_SUPABASE_FUNCTIONS_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          # Supabase / functions
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Qdrant
          QDRANT_URL: ${{ vars.QDRANT_URL }}
          QDRANT_COLLECTION: ${{ vars.QDRANT_COLLECTION }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          # Other services (only ones currently used by build/runtime)
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DOCLING_SERVICE_URL: ${{ vars.DOCLING_SERVICE_URL }}
          VLW_API_KEY: ${{ secrets.VLW_API_KEY }}
        run: pnpm run build
